<style>
/* ===========================
   DESIGN SYSTEM — DECANTER THEME
   =========================== */
:root {
  --bg: #e8f4fd;
  --card-bg: rgba(255,255,255,0.92);
  --text: #1a2a3a;
  --text-muted: #5a6a7a;
  --accent: #2196F3;
  --accent-dark: #1565C0;
  --green: #4CAF50;
  --green-dark: #388E3C;
  --red: #f44336;
  --red-dark: #c62828;
  --orange: #FF9800;
  --orange-dark: #E65100;
  --yellow: #FFC107;
  --border: rgba(0,0,0,0.08);
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --radius: 16px;

  /* Spacing */
  --space-1:  0.25rem;
  --space-2:  0.5rem;
  --space-3:  0.75rem;
  --space-4:  1rem;
  --space-5:  1.25rem;
  --space-6:  1.5rem;
  --space-8:  2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;

  /* Typography */
  --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --text-xs:   0.75rem;
  --text-sm:   0.875rem;
  --text-base: 1rem;
  --text-lg:   1.125rem;
  --text-xl:   1.375rem;
  --text-2xl:  1.75rem;
  --text-3xl:  2.25rem;

  /* Radii */
  --radius-sm:   6px;
  --radius-md:   8px;
  --radius-lg:   12px;
  --radius-xl:   16px;
  --radius-2xl:  20px;
  --radius-full: 9999px;

  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --content-width: 800px;

  /* Card / Table */
  --card-text: #1a2a3a;
  --card-text-muted: #5a6a7a;
  --card-text-faint: #9aacbc;
  --table-header-bg: rgba(33, 150, 243, 0.07);
  --table-row-hover: rgba(33, 150, 243, 0.04);
  --table-border: rgba(0,0,0,0.07);

  --input-bg: rgba(255,255,255,0.85);
  --input-bg-focus: #ffffff;
  --input-text: #1a2a3a;
  --input-placeholder: rgba(26,42,58,0.35);
  --input-border: rgba(26,42,58,0.18);
}

/* ===========================
   BASE RESET
   =========================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  min-height: 100dvh;
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--text);
  background-color: var(--bg);
  line-height: 1.6;
  overflow-x: hidden;
  position: relative;
}

/* Chemistry/Beaker SVG Background */

  background-size: 220px 220px;
}

img, picture, video, canvas, svg { display: block; max-width: 100%; height: auto; }
input, button, textarea, select { font: inherit; color: inherit; }
h1, h2, h3 { text-wrap: balance; line-height: 1.15; }
button { cursor: pointer; background: none; border: none; }
table { border-collapse: collapse; width: 100%; }

::selection {
  background: rgba(33, 150, 243, 0.2);
  color: var(--text);
}

a, button, input, textarea, select {
  transition: color var(--transition),
              background var(--transition),
              border-color var(--transition),
              box-shadow var(--transition),
              transform var(--transition);
}

/* ===========================
   LAYOUT
   =========================== */
.app-container {
  position: relative;
  z-index: 1;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: var(--space-6) var(--space-4) var(--space-12);
}

@media (min-width: 768px) {
  .app-container { padding: var(--space-8) var(--space-8) var(--space-12); }
}

/* ===========================
   HEADER
   =========================== */
.header {
  text-align: center;
  margin-bottom: var(--space-6);
  width: 100%;
  max-width: var(--content-width);
}

.header h1 {
  font-size: 28px;
  font-weight: 800;
  color: var(--accent-dark);
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}

.header p {
  font-size: var(--text-sm);
  color: var(--text-muted);
  font-weight: 500;
}

/* ===========================
   CARD
   =========================== */
.card {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow);
  width: 100%;
  max-width: var(--content-width);
  margin-bottom: var(--space-4);
  color: var(--card-text);
}

.card-body {
  padding: var(--space-6);
}

@media (min-width: 768px) {
  .card-body { padding: var(--space-8); }
}

/* ===========================
   OPERATOR BADGE / HEADER BAR
   =========================== */
.header-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-6);
  border-bottom: 1px solid var(--table-border);
  gap: var(--space-3);
  flex-wrap: wrap;
}

.operator-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  background: rgba(33, 150, 243, 0.1);
  color: var(--accent-dark);
  border-radius: var(--radius-full);
  padding: var(--space-1) var(--space-3) var(--space-1) var(--space-2);
  font-size: var(--text-sm);
  font-weight: 600;
  border: 1px solid rgba(33, 150, 243, 0.2);
}

.operator-badge-icon {
  width: 28px;
  height: 28px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius-full);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-xs);
  font-weight: 700;
  flex-shrink: 0;
}

.operator-badge-x {
  background: none;
  border: none;
  color: var(--accent-dark);
  font-size: 18px;
  line-height: 1;
  padding: 0 0 0 var(--space-1);
  cursor: pointer;
  opacity: 0.6;
  transition: opacity var(--transition);
}

.operator-badge-x:hover { opacity: 1; }

/* ===========================
   STATUS BAR
   =========================== */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: 600;
  background: rgba(90, 106, 122, 0.1);
  color: var(--text-muted);
}

.status-pill.loading {
  background: rgba(255, 152, 0, 0.12);
  color: var(--orange-dark);
}

.status-pill.error {
  background: rgba(244, 67, 54, 0.1);
  color: var(--red-dark);
}

.status-pill.idle {
  background: rgba(90, 106, 122, 0.1);
  color: var(--text-muted);
}

.status-pill.running {
  background: rgba(76, 175, 80, 0.12);
  color: var(--green-dark);
}

/* ===========================
   BUTTONS
   =========================== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  font-family: var(--font-body);
  font-weight: 700;
  border-radius: 12px;
  padding: var(--space-3) var(--space-6);
  font-size: var(--text-base);
  letter-spacing: 0.03em;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  transition: all var(--transition);
  user-select: none;
  touch-action: manipulation;
  white-space: normal;
  line-height: 1.3;
}

.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-full {
  width: 100%;
  max-width: 400px;
  min-height: 56px;
  font-size: 1.05rem;
}

.btn-big {
  width: 100%;
  min-height: 64px;
  font-size: var(--text-lg);
}

@media (min-width: 768px) {
  .btn-big { min-height: 72px; font-size: var(--text-xl); }
}

.btn-green {
  background: var(--green);
  color: #fff;
}
.btn-green:hover {
  background: var(--green-dark);
  box-shadow: 0 4px 16px rgba(76, 175, 80, 0.3);
}

.btn-red {
  background: var(--red);
  color: #fff;
}
.btn-red:hover {
  background: var(--red-dark);
  box-shadow: 0 4px 16px rgba(244, 67, 54, 0.3);
}

.btn-orange {
  background: var(--orange);
  color: #fff;
}
.btn-orange:hover {
  background: var(--orange-dark);
  box-shadow: 0 4px 16px rgba(255, 152, 0, 0.3);
}

.btn-accent {
  background: var(--accent);
  color: #fff;
}
.btn-accent:hover {
  background: var(--accent-dark);
  box-shadow: 0 4px 16px rgba(33, 150, 243, 0.3);
}

.btn-secondary {
  background: rgba(26, 42, 58, 0.06);
  color: var(--card-text);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  background: rgba(26, 42, 58, 0.1);
}

.btn-ghost {
  background: transparent;
  color: var(--card-text-muted);
  border: none;
  font-size: var(--text-xs);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: var(--space-2) var(--space-3);
  min-height: 36px;
  border-radius: var(--radius-md);
}
.btn-ghost:hover {
  color: var(--card-text);
  background: rgba(26, 42, 58, 0.06);
}

.btn-refresh {
  background: transparent;
  color: var(--card-text-muted);
  padding: var(--space-2) var(--space-3);
  min-height: 32px;
  font-size: var(--text-xs);
  border: 1px solid var(--table-border);
  border-radius: var(--radius-md);
  font-weight: 600;
  letter-spacing: 0.03em;
}
.btn-refresh:hover {
  background: var(--table-header-bg);
  color: var(--card-text);
}

/* ===========================
   LOGIN FORM
   =========================== */
.login-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-4);
  width: 100%;
}

.login-label {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--card-text);
  text-align: center;
}

.login-input {
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-lg);
  border: 1.5px solid var(--input-border);
  background: var(--input-bg);
  font-size: var(--text-xl);
  min-height: 60px;
  color: var(--input-text);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-weight: 700;
  width: 100%;
  max-width: 300px;
}

.login-input::placeholder {
  color: var(--input-placeholder);
  text-transform: none;
  letter-spacing: normal;
  font-weight: 400;
  font-size: var(--text-base);
}

.login-input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--input-bg-focus);
  box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.15);
}

.login-hint {
  font-size: var(--text-xs);
  color: var(--card-text-faint);
  text-align: center;
}

.error-msg {
  background: rgba(244, 67, 54, 0.08);
  color: var(--red-dark);
  border: 1px solid rgba(244, 67, 54, 0.2);
  border-radius: var(--radius-md);
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm);
  font-weight: 600;
  text-align: center;
  display: none;
  max-width: 300px;
  animation: shake 0.4s ease-out;
}
.error-msg.visible { display: block; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* ===========================
   QUEUE LIST
   =========================== */
.queue-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-4);
}

.queue-title {
  font-size: var(--text-lg);
  font-weight: 700;
  color: var(--card-text);
}

.queue-count {
  font-size: var(--text-xs);
  color: var(--card-text-muted);
  font-weight: 600;
  background: rgba(33, 150, 243, 0.08);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full);
}

.queue-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.queue-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-4);
  border-radius: var(--radius-xl);
  border: 1.5px solid var(--border);
  background: rgba(255,255,255,0.6);
  transition: all 0.25s ease;
}

.queue-item.next-up {
  border-color: var(--green);
  background: rgba(76, 175, 80, 0.06);
  box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.25);
  animation: pulse-border 2.2s infinite;
}

.queue-item.running {
  border-color: var(--green);
  background: rgba(76, 175, 80, 0.08);
  box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
}

.queue-item.queued {
  opacity: 0.55;
}

@keyframes pulse-border {
  0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.25); }
  50% { box-shadow: 0 0 0 7px rgba(76, 175, 80, 0); }
}

.queue-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  min-width: 32px;
  border-radius: var(--radius-full);
  background: var(--accent);
  color: #fff;
  font-size: var(--text-xs);
  font-weight: 700;
  flex-shrink: 0;
}

.queue-item.next-up .queue-num,
.queue-item.running .queue-num {
  background: var(--green);
}

.queue-info {
  flex: 1;
  min-width: 0;
}

.queue-name {
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--card-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.queue-meta {
  font-size: var(--text-xs);
  color: var(--card-text-muted);
  margin-top: 2px;
}

.queue-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--green-dark);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.live-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  background: var(--green);
  border-radius: var(--radius-full);
  animation: blink 1.1s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.25; }
}

/* ===========================
   TIMER DISPLAY (Decanter Style)
   =========================== */
.timer-card {
  background: #0f1a2a;
  border-radius: var(--radius-xl);
  padding: var(--space-6);
  text-align: center;
  margin-bottom: var(--space-4);
}

.timer-label {
  font-size: var(--text-xs);
  color: #6a8aaa;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: var(--space-1);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
}

.timer-value {
  font-family: 'Courier New', monospace;
  font-size: clamp(2.5rem, 8vw, 3.5rem);
  font-weight: 700;
  color: #4CAF50;
  letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
}

.timer-started {
  font-size: var(--text-xs);
  color: #4a6a8a;
  margin-top: var(--space-1);
}

.timer-batch-name {
  font-size: var(--text-lg);
  font-weight: 700;
  color: #d4e4f4;
  margin-top: var(--space-3);
}

/* ===========================
   PUSH CONTROL AREA
   =========================== */
.section-title {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--card-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--space-3);
}

.push-area {
  background: rgba(76, 175, 80, 0.04);
  border: 2px dashed rgba(76, 175, 80, 0.22);
  border-radius: var(--radius-xl);
  padding: var(--space-6);
  text-align: center;
}

.push-batch-name {
  font-size: var(--text-xl);
  font-weight: 800;
  color: var(--card-text);
  margin-bottom: var(--space-1);
}

.push-batch-meta {
  font-size: var(--text-sm);
  color: var(--card-text-muted);
  margin-bottom: var(--space-5);
}

.push-arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-3);
  margin-bottom: var(--space-5);
  color: var(--card-text-muted);
  font-size: var(--text-sm);
  font-weight: 600;
}

.push-arrow svg {
  color: var(--green);
  flex-shrink: 0;
}

/* ===========================
   LOG TABLE
   =========================== */
.log-table-wrapper {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  border: 1px solid var(--table-border);
}

.log-table {
  font-size: var(--text-sm);
  white-space: nowrap;
}

.log-table thead { background: var(--table-header-bg); }

.log-table th {
  padding: var(--space-3) var(--space-4);
  text-align: left;
  font-weight: 700;
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--card-text-muted);
  border-bottom: 1px solid var(--table-border);
}

.log-table td {
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--table-border);
  color: var(--card-text);
}

.log-table tbody tr:last-child td { border-bottom: none; }
.log-table tbody tr:hover { background: var(--table-row-hover); }

.badge-pushed {
  display: inline-flex;
  align-items: center;
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: 700;
  background: rgba(76, 175, 80, 0.12);
  color: var(--green-dark);
}

/* ===========================
   MODAL
   =========================== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 30, 50, 0.45);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: var(--space-4);
  opacity: 0;
  pointer-events: none;
  transition: opacity 240ms ease;
}

.modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.modal-card {
  background: rgba(255,255,255,0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius-2xl);
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  width: 100%;
  max-width: 480px;
  color: var(--card-text);
  transform: scale(0.95) translateY(10px);
  transition: transform 250ms cubic-bezier(0.16, 1, 0.3, 1);
}

.modal-overlay.active .modal-card {
  transform: scale(1) translateY(0);
}

.modal-header {
  padding: var(--space-6) var(--space-6) var(--space-4);
  text-align: center;
}

.modal-title {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: var(--space-2);
  color: var(--card-text);
}

.modal-subtitle {
  font-size: var(--text-sm);
  color: var(--card-text-muted);
}

.modal-body {
  padding: 0 var(--space-6) var(--space-6);
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

/* ===========================
   DATETIME INPUT
   =========================== */
.datetime-row {
  display: flex;
  gap: var(--space-3);
  margin-bottom: var(--space-1);
}

.datetime-row > div {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
}

.datetime-row label {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--card-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.datetime-input {
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-lg);
  border: 1.5px solid var(--input-border);
  background: var(--input-bg);
  font-size: var(--text-base);
  min-height: 44px;
  color: var(--input-text);
  font-weight: 500;
  width: 100%;
}

.datetime-input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--input-bg-focus);
  box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.12);
}

/* ===========================
   TOAST
   =========================== */
.toast-container {
  position: fixed;
  bottom: var(--space-6);
  left: 50%;
  transform: translateX(-50%);
  z-index: 500;
  pointer-events: none;
}

.toast {
  background: #1a2a3a;
  color: #fff;
  padding: var(--space-3) var(--space-6);
  border-radius: var(--radius-full);
  font-weight: 600;
  font-size: var(--text-sm);
  text-align: center;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 280ms ease, transform 280ms ease;
  white-space: nowrap;
}

.toast.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ===========================
   SCREEN STATES
   =========================== */
.screen { display: none; width: 100%; max-width: var(--content-width); }
.screen.active {
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: fadeIn 300ms ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===========================
   UTILITY
   =========================== */
.empty-state {
  text-align: center;
  padding: var(--space-8) var(--space-4);
  color: var(--card-text-faint);
  font-size: var(--text-sm);
}

.divider {
  height: 1px;
  background: var(--table-border);
  margin: var(--space-6) 0;
}

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(0,0,0,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ===========================
   FOOTER
   =========================== */
.app-footer {
  text-align: center;
  padding: var(--space-6) var(--space-4) var(--space-2);
  font-size: var(--text-xs);
  color: var(--text-muted);
  opacity: 0.7;
}

.app-footer a {
  color: var(--accent-dark);
  text-decoration: underline;
  text-underline-offset: 2px;
}
.app-footer a:hover { opacity: 0.8; }
</style>
</head>

<script>
/* ===========================
   CONFIG
   =========================== */
var MONDAY_API   = 'https://api.monday.com/v2';
var MONDAY_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjYyNzA3NzcxOSwiYWFpIjoxMSwidWlkIjo3NTA2NTY3OCwiaWFkIjoiMjAyNi0wMi0yOFQwMToxNzowOS4wMDBaIiwicGVyIjoibWU6d3JpdGUiLCJhY3RpZCI6MjkxNDg2NzMsInJnbiI6InVzZTEifQ.ocD9w0Q-17JqNfU4iZXL4i3frn_Bw4pyVe_fkhJuiPg';
var BOARD_ID     = '18402821844';
var RO_GROUP     = 'group_mm16ennm';   // Pre-RO system (permanent storage)
var BASIFY_GROUP = 'group_mm16wch5';   // Basify and Flocc
var DEST_GROUP   = 'group_mm163d9y';   // Tank C
var RO_ARRIVAL_COL = 'text_mm1db43';   // "RO Completed" column — arrival timestamp

var VITAL_BOARD_ID = '18402880277';
var SODIUM_HYDROXIDE_GROUP = 'group_mm17rn98';
var SODA_ASH_GROUP = 'group_mm17ansz';
var BAGS_COLUMN = 'numeric_mm17bhbw';


/* ===========================
   STATE
   =========================== */
var currentOperator = null;
var roBatches = [];           // RO batches from Monday
var activeBatch = null;       // The batch currently being basified
var runStartTime = null;
var timerInterval = null;
var sessionLogs = [];
var pendingLogEntry = null;

/* ===========================
   MONDAY API
   =========================== */
async function mondayQuery(query, vars) {
  const res = await fetch(MONDAY_API, {
    method: 'POST',
    headers: {
      Authorization: MONDAY_TOKEN,
      'Content-Type': 'application/json',
      'API-Version': '2024-01'
    },
    body: JSON.stringify({ query, variables: vars })
  });
  const json = await res.json();
  if (json.errors) throw new Error(json.errors[0].message);
  return json.data;
}

async function loadBatches() {
  setStatus('loading', 'Loading RO batches...');
  try {
    const data = await mondayQuery(`{
      boards(ids: [${BOARD_ID}]) {
        items_page(limit: 100, query_params: {
          rules: [{ column_id: "group", compare_value: ["${RO_GROUP}"] }]
        }) {
          items {
            id name
            column_values { id text value }
          }
        }
      }
    }`);
    const items = data.boards[0].items_page.items;

    const now = Date.now();
    const cutoff = now - 24 * 60 * 60 * 1000; // 24h

    roBatches = items
      .map(item => {
        const cols = {};
        item.column_values.forEach(cv => { cols[cv.id] = cv; });
        const arrivalText = cols[RO_ARRIVAL_COL]?.text || '';
        const arrivalDate = arrivalText ? new Date(arrivalText) : null;
        return {
          id: item.id,
          name: item.name,
          arrival: arrivalDate,
          arrivalText
        };
      })
      .filter(b => !b.arrival || b.arrival.getTime() >= cutoff)
      .sort((a, b) => {
        if (!a.arrival && !b.arrival) return 0;
        if (!a.arrival) return 1;
        if (!b.arrival) return -1;
        return a.arrival - b.arrival; // oldest first
      });

    renderQueue();
    renderControl();
    setStatus('idle', `${roBatches.length} RO batch${roBatches.length !== 1 ? 'es' : ''} ready`);
  } catch (err) {
    console.error(err);
    setStatus('error', 'Failed to load batches');
  }
}

async function moveBatchToBasify(batchId) {
  await mondayQuery(`mutation {
    move_item_to_group(item_id: ${batchId}, group_id: "${BASIFY_GROUP}") { id }
  }`);
}

async function moveBatchToDestGroup(batchId, startDateStr, startTimeStr, endDateStr, endTimeStr) {
  // Move to Tank C group
  await mondayQuery(`mutation {
    move_item_to_group(item_id: ${batchId}, group_id: "${DEST_GROUP}") { id }
  }`);
  // Update columns (if column IDs are available) — placeholder for actual column updates
  // column_values update can be added here
}

/* ===========================
   RENDER QUEUE
   =========================== */
function renderQueue() {
  const container = document.getElementById('queueContainer');
  const countEl = document.getElementById('queueCount');
  countEl.textContent = `${roBatches.length} batch${roBatches.length !== 1 ? 'es' : ''}`;

  if (roBatches.length === 0) {
    container.innerHTML = `<div class="empty-state">No RO batches in the last 24h</div>`;
    return;
  }

  let html = '<ul class="queue-list">';
  roBatches.forEach((batch, i) => {
    const isActive = activeBatch && activeBatch.id === batch.id;
    let cls = 'queue-item';
    if (isActive) cls += ' running';
    else if (i === 0 && !activeBatch) cls += ' next-up';
    else cls += ' queued';

    html += `
      <li class="${cls}" id="qi-${batch.id}">
        <span class="queue-num">${i + 1}</span>
        <div class="queue-info">
          <div class="queue-name">${escHtml(batch.name)}</div>
          <div class="queue-meta">${batch.arrivalText ? 'Arrived ' + formatShortDate(batch.arrival) : 'No arrival date'}</div>
        </div>
        ${isActive ? `<span class="queue-badge"><span class="live-dot"></span> Running</span>` : ''}
      </li>`;
  });
  html += '</ul>';
  container.innerHTML = html;
}

/* ===========================
   RENDER CONTROL
   =========================== */
function renderControl() {
  const c = document.getElementById('controlContainer');

  if (activeBatch) {
    // RUNNING STATE
    c.innerHTML = `
      <div class="timer-card">
        <div class="timer-label"><span class="live-dot"></span> Basify Running</div>
        <div class="timer-value" id="timerValue">00:00:00</div>
        <div class="timer-started">Started ${formatDateTime(runStartTime)}</div>
        <div class="timer-batch-name">${escHtml(activeBatch.name)}</div>
      </div>
      <div style="text-align:center;">
        <button class="btn btn-red btn-big" onclick="stopBasify()">STOP BASIFY</button>
      </div>`;
    startTimer();

  } else if (roBatches.length > 0) {
    // IDLE — show next batch and start button
    const next = roBatches[0];
    c.innerHTML = `
      <div class="push-area">
        <div class="push-batch-name">${escHtml(next.name)}</div>
        <div class="push-batch-meta">${next.arrivalText ? 'RO completed ' + formatShortDate(next.arrival) : 'Next up'}</div>
        <div class="push-arrow">
          <span>RO Storage</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          <span>Basify &amp; Flocc</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          <span>Tank C</span>
        </div>
        <button class="btn btn-green btn-big" onclick="startBasify()">START BASIFY</button>
      </div>`;

  } else {
    c.innerHTML = `<div class="empty-state">No RO batches available to basify</div>`;
  }
}

/* ===========================
   BASIFY ACTIONS
   =========================== */
function startBasify() {
  if (activeBatch || roBatches.length === 0) return;
  activeBatch = roBatches[0];
  runStartTime = new Date();
  renderQueue();
  renderControl();
  setStatus('running', `Basifying: ${activeBatch.name}`);
  showToast('Basify started: ' + activeBatch.name);
}

function stopBasify() {
  if (!activeBatch) return;
  stopTimer();
  const stopTime = new Date();
  pendingLogEntry = {
    batch: activeBatch,
    startTime: runStartTime,
    stopTime,
    duration: formatDuration(runStartTime, stopTime),
    pushed: false
  };
  openConfirmModal();
}

function openConfirmModal() {
  const overlay = document.getElementById('modal-confirm');
  const title   = document.getElementById('modalTitle');
  const sub     = document.getElementById('modalSubtitle');
  const body    = document.getElementById('modalBody');

  title.textContent = 'Complete Basify Run?';
  sub.textContent   = `Batch: ${pendingLogEntry.batch.name} · Duration: ${pendingLogEntry.duration}`;

  // Pre-fill date/time inputs with current values
  const now = new Date();
  const startD = fmtDateInput(pendingLogEntry.startTime);
  const startT = fmtTimeInput(pendingLogEntry.startTime);
  const endD   = fmtDateInput(now);
  const endT   = fmtTimeInput(now);

  body.innerHTML = `
    <p style="font-size:var(--text-sm);color:var(--card-text-muted);">Review and adjust start/end times, then confirm to move the batch to Tank C.</p>
    <div class="datetime-row">
      <div>
        <label>Start Date</label>
        <input type="date" class="datetime-input" id="inp-start-date" value="${startD}">
      </div>
      <div>
        <label>Start Time</label>
        <input type="time" class="datetime-input" id="inp-start-time" value="${startT}">
      </div>
    </div>
    <div class="datetime-row">
      <div>
        <label>End Date</label>
        <input type="date" class="datetime-input" id="inp-end-date" value="${endD}">
      </div>
      <div>
        <label>End Time</label>
        <input type="time" class="datetime-input" id="inp-end-time" value="${endT}">
      </div>
    </div>
    <button class="btn btn-green" style="width:100%;" onclick="confirmComplete()">Confirm &amp; Move to Tank C</button>
    <button class="btn btn-secondary" style="width:100%;" onclick="closeModal()">Cancel</button>`;

  overlay.classList.add('active');
}

async function confirmComplete() {
  const startDate = document.getElementById('inp-start-date').value;
  const startTime = document.getElementById('inp-start-time').value;
  const endDate   = document.getElementById('inp-end-date').value;
  const endTime   = document.getElementById('inp-end-time').value;

  closeModal();
  setStatus('loading', 'Moving batch to Tank C...');

  try {
    await moveBatchToBasify(pendingLogEntry.batch.id);
    await moveBatchToDestGroup(pendingLogEntry.batch.id, startDate, startTime, endDate, endTime);
    pendingLogEntry.pushed = true;
    showToast(`${pendingLogEntry.batch.name} moved to Tank C`);
  } catch (err) {
    console.error(err);
    showToast('Error moving batch. Check console.');
  }

  sessionLogs.unshift(pendingLogEntry);
  pendingLogEntry = null;
  activeBatch = null;
  runStartTime = null;
  await loadBatches();
  renderLog();
}

function closeModal() {
  document.getElementById('modal-confirm').classList.remove('active');
  if (!pendingLogEntry) return;
  // If cancelled, restore state so user can restart
  activeBatch = null;
  runStartTime = null;
  pendingLogEntry = null;
  renderQueue();
  renderControl();
  setStatus('idle', `${roBatches.length} RO batch${roBatches.length !== 1 ? 'es' : ''} ready`);
}

/* ===========================
   RENDER LOG
   =========================== */
function renderLog() {
  const c = document.getElementById('logContainer');
  if (sessionLogs.length === 0) {
    c.innerHTML = `<div class="empty-state" style="padding:var(--space-4);">No batches processed this session</div>`;
    return;
  }

  let html = `<div class="log-table-wrapper"><table class="log-table">
    <thead><tr>
      <th>Batch</th><th>Started</th><th>Duration</th><th>Moved</th>
    </tr></thead><tbody>`;

  sessionLogs.forEach(log => {
    html += `<tr>
      <td><strong>${escHtml(log.batch.name)}</strong></td>
      <td>${formatTime(log.startTime)}</td>
      <td>${log.duration}</td>
      <td>${log.pushed ? '<span class="badge-pushed">Tank C</span>' : '—'}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  c.innerHTML = html;
}

/* ===========================
   TIMER
   =========================== */
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
  updateTimer();
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function updateTimer() {
  const el = document.getElementById('timerValue');
  if (!el || !runStartTime) return;
  const s = Math.floor((Date.now() - runStartTime) / 1000);
  el.textContent = fmt2(Math.floor(s/3600)) + ':' + fmt2(Math.floor((s%3600)/60)) + ':' + fmt2(s%60);
}

/* ===========================
   AUTH
   =========================== */
function handleDropdownLogin() {
  var sel = document.getElementById('operatorSelect');
  var name = sel.value;
  if (!name) return;
  currentOperator = name;
  const initials = currentOperator.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('operatorInitials').textContent = initials;
  document.getElementById('operatorNameDisplay').textContent = currentOperator;
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-main').classList.add('active');
  showToast('Welcome, ' + currentOperator + '!');
  loadBatches();
}

function logout() {
  window.location.href = "https://kmjz-master-hub.vercel.app";
}

/* ===========================
   HELPERS
   =========================== */
function setStatus(type, msg) {
  const pill = document.getElementById('statusPill');
  const txt  = document.getElementById('statusText');
  pill.className = `status-pill ${type}`;
  txt.innerHTML = type === 'loading' ? `<span class="spinner" style="width:12px;height:12px;border-width:1.5px;"></span> ${msg}` : msg;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 3000);
}

function formatDateTime(d) {
  if (!d) return '';
  return d.toLocaleDateString('en-US', {month:'short',day:'numeric'}) + ' ' +
    d.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true});
}

function formatShortDate(d) {
  if (!d) return '';
  return d.toLocaleDateString('en-US', {month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
}

function formatTime(d) {
  if (!d) return '';
  return d.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit',hour12:true});
}

function formatDuration(s, e) {
  const sec = Math.floor((e - s) / 1000);
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), ss = sec%60;
  if (h > 0) return `${h}h ${m}m ${ss}s`;
  if (m > 0) return `${m}m ${ss}s`;
  return `${ss}s`;
}

function fmt2(n) { return String(n).padStart(2,'0'); }

function fmtDateInput(d) {
  return d.getFullYear() + '-' + fmt2(d.getMonth()+1) + '-' + fmt2(d.getDate());
}

function fmtTimeInput(d) {
  return fmt2(d.getHours()) + ':' + fmt2(d.getMinutes());
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ===========================
   INIT
   =========================== */
document.getElementById('logout-btn').addEventListener('click', logout);

document.getElementById('modal-confirm').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>


<script>
// === AUTO-SET OPERATOR FROM LOCALSTORAGE (no code wall) ===
(function() {
  var name = null;
  try { name = localStorage.getItem('kmjz_operator_name'); } catch(e) {}
  if (name && typeof state !== 'undefined' && state) {
    state.currentOperator = name;
    if (typeof state.currentCode !== 'undefined') {
      try { state.currentCode = localStorage.getItem('kmjz_operator_code') || ''; } catch(e) {}
    }
  } else if (name) {
    if (typeof currentOperator !== 'undefined') {
      currentOperator = name;
    }
    window._autoOperator = name;
  }
  // Update operator badge if exists
  var badge = document.getElementById('operatorName') || document.getElementById('operatorBadge');
  if (badge && name) badge.textContent = name;
  // Update any operator display elements
  document.querySelectorAll('[id*="perator"]').forEach(function(el) {
    if (el.tagName === 'SPAN' && el.id.toLowerCase().includes('name') && name) {
      el.textContent = name;
    }
  });
})();
</script>
